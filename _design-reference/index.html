<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia NPB – Área de Membros</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <i class="fas fa-shield-halved"></i>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item active" title="Início"><i class="fas fa-house"></i></a>
      <a href="#" class="nav-item" title="Favoritos"><i class="fas fa-bookmark"></i></a>
      <a href="#" class="nav-item" title="Comunidade"><i class="fas fa-face-smile"></i></a>
      <a href="#" class="nav-item" title="Perfil"><i class="fas fa-user"></i></a>
      <a href="#" class="nav-item" title="Suporte"><i class="fas fa-at"></i></a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn"><i class="fas fa-bars"></i></button>
      <div class="topbar-right">
        <div class="search-box">
          <input type="text" placeholder="Pesquisar" />
          <i class="fas fa-magnifying-glass"></i>
        </div>
        <div class="notif-btn">
          <i class="fas fa-bell"></i>
          <span class="badge">7</span>
        </div>
        <div class="avatar">
          <img src="https://ui-avatars.com/api/?name=NPB&background=c9922a&color=fff&bold=true" alt="Avatar" />
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="content">
      <div class="breadcrumb-tag">Início</div>

      <!-- NOSSOS CURSOS -->
      <section class="section">
        <div class="section-header">
          <h2>Nossos Cursos</h2>
          <a href="cursos.html" class="ver-tudo">Ver tudo <i class="fas fa-arrow-right"></i></a>
        </div>
        <div class="carousel-wrapper">
          <div class="course-grid" id="courseGrid">

            <a href="curso.html?p=m20k" class="course-card">
              <div class="card-thumb" style="background:#0d0d0d">
                <img src="imagens/m20k/logo m20k.jpg" alt="Mentoria M20K" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
              </div>
              <div class="card-bar active"></div>
            </a>

            <a href="curso.html?p=lta2" class="course-card">
              <div class="card-thumb" style="background:#0d0d0d">
                <img src="imagens/LTA 2/logo lta 2.jpg" alt="Low Ticket Automático 2.0" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
              </div>
              <div class="card-bar active"></div>
            </a>

            <a href="curso.html?p=dtd" class="course-card">
              <div class="card-thumb" style="background:#0d0d0d">
                <img src="imagens/dtd/logo dtd.jpg" alt="Dólar Todo Dia" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
              </div>
              <div class="card-bar"></div>
            </a>

            <a href="curso.html" class="course-card">
              <div class="card-thumb" style="background: linear-gradient(135deg,#0a0d1a,#00051a)">
                <div class="card-title-overlay center">
                  <span class="card-tag-sm">LOWTICKETS EM</span>
                  <strong>DÓLAR</strong>
                </div>
              </div>
              <div class="card-bar"></div>
            </a>

            <a href="curso.html" class="course-card">
              <div class="card-thumb" style="background: linear-gradient(135deg,#1a1500,#0d0d0d)">
                <div class="card-title-overlay center">
                  <strong>ACADEMIA<br>DO LOW TICKET</strong>
                </div>
              </div>
              <div class="card-bar"></div>
            </a>

            <a href="curso.html" class="course-card">
              <div class="card-thumb" style="background: linear-gradient(135deg,#0d0d0d,#1a1a1a)">
                <div class="card-title-overlay center">
                  <span class="card-tag">LOW TICKET</span>
                  <strong>AUTOMÁTICO</strong>
                </div>
              </div>
              <div class="card-bar"></div>
            </a>

          </div>
        </div>
      </section>

      <!-- EXPANSÕES -->
      <section class="section">
        <div class="section-header">
          <h2>Expansões para Lucrar mais!</h2>
          <a href="#" class="ver-tudo">Ver tudo <i class="fas fa-arrow-right"></i></a>
        </div>
        <div class="expansion-grid">

          <a href="curso.html" class="expansion-card">
            <div class="expansion-badge">EXPANSÃO</div>
            <div class="expansion-thumb" style="background:linear-gradient(135deg,#1a1500,#0d0d00)">
              <i class="fas fa-clapperboard" style="font-size:2.5rem;color:#c9922a;opacity:0.5"></i>
            </div>
          </a>

          <a href="curso.html" class="expansion-card">
            <div class="expansion-badge">EXPANSÃO</div>
            <div class="expansion-thumb" style="background:linear-gradient(135deg,#1a1200,#0a0800)">
              <i class="fas fa-treasure-chest" style="font-size:2.5rem;color:#c9922a;opacity:0.5"></i>
            </div>
          </a>

          <a href="curso.html" class="expansion-card">
            <div class="expansion-badge">EXPANSÃO</div>
            <div class="expansion-thumb" style="background:linear-gradient(135deg,#0d0d0d,#1a1a1a)">
              <i class="fas fa-sack-dollar" style="font-size:2.5rem;color:#c9922a;opacity:0.5"></i>
            </div>
          </a>

        </div>
      </section>

      <!-- CONTINUE ASSISTINDO -->
      <section class="section">
        <div class="section-header">
          <h2>Continue assistindo</h2>
        </div>
        <div class="continue-list">
          <a href="player.html?p=lta2&m=0&l=0" class="continue-item">
            <div class="continue-thumb">
              <i class="fas fa-play"></i>
            </div>
            <div class="continue-info">
              <span class="continue-course">Low Ticket Automático 2.0</span>
              <span class="continue-lesson">Boas-vindas!</span>
              <div class="progress-bar"><div class="progress-fill" style="width:35%"></div></div>
            </div>
          </a>
        </div>
      </section>

    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
